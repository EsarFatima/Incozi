<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Incozi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="container top-bar-inner">
      <span>US Business Services</span>
      <div class="top-bar-links">
        <a href="../pages/account.html">Client Login</a>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">incozi.</a>
      
      <!-- Navbar Links (Desktop) -->
      <nav class="main-nav" style="display: none;">
          <ul class="nav-list" style="display: flex; gap: 1.5rem; list-style: none; align-items: center; margin: 0;">
              <li class="nav-item">
                  <a href="#" class="nav-link">Services & Pricing <i class="fa-solid fa-chevron-down"></i></a>
                  <ul class="dropdown-menu">
                      <li><a href="incorporation.html">Incorporation</a></li>
                      <li><a href="tax-compliance.html">Tax & Compliance</a></li>
                      <li><a href="bookkeeping.html">Bookkeeping</a></li>
                      <li><a href="consultation.html">Consultation</a></li>
                  </ul>
              </li>
              <li><a href="blog.html" class="nav-link">Blog</a></li>
              <li><a href="my-services.html" class="nav-link">My Services</a></li>
              <li><a href="account.html" class="nav-link" aria-label="My Account"><i class="fa-regular fa-user"></i></a></li>
              <li><a href="cart.html" class="nav-link" aria-label="Cart"><i class="fa-solid fa-cart-shopping"></i></a></li>
          </ul>
      </nav>

      <!-- Menu Toggle (Hamburger) -->
      <button class="menu-toggle custom-toggle" aria-label="Open Menu"><i class="fa-solid fa-bars"></i></button>
    </div>
  </header>

  <!-- Forgot Password Section -->
  <main class="account-section" style="min-height: 60vh; padding-top: 4rem;">
    <div class="container">
      <div class="auth-card-container">
        
        <div class="auth-header">
           <h1>Reset Password</h1>
           <p>Enter your email to receive reset instructions</p>
        </div>

        <div class="auth-card">
          <form id="forgot-password-form">
               <div class="form-group">
                 <label for="fp-email">Email Address</label>
                 <div class="input-wrapper">
                   <i class="fa-regular fa-envelope input-icon"></i>
                   <input type="email" id="fp-email" placeholder="you@company.com" required>
                 </div>
               </div>
               
               <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
          </form>
          <div style="text-align: center; margin-top: 1rem;">
              <a href="account.html" class="back-to-login">Back to Login</a>
          </div>
          <p id="message" style="text-align: center; margin-top: 1rem;"></p>
        </div>

      </div>
    </div>
  </main>

  <script>
    document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('fp-email').value;
        const msg = document.getElementById('message');
        const btn = e.target.querySelector('button');
        
        btn.disabled = true;
        btn.textContent = 'Sending...';
        msg.textContent = '';
        msg.style.color = 'inherit';

        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            
            if (res.ok) {
                msg.style.color = 'green';
                msg.textContent = data.message;
            } else {
                msg.style.color = 'red';
                msg.textContent = data.error || 'Something went wrong.';
            }
        } catch (err) {
            msg.style.color = 'red';
            msg.textContent = 'Network error. Please try again.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send Reset Link';
        }
    });
  </script>
</body>
</html>
