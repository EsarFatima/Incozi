<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting - Incozi</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    .container {
      text-align: center;
      color: white;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    p {
      margin: 0.5rem 0 0;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin Dashboard Removed</h1>
    <p>Redirecting you to the main account page...</p>
  </div>
  
  <script>
    // Redirect to main account page
    setTimeout(() => {
      window.location.href = 'account.html';
    }, 1000);
  </script>
</body>
</html>
