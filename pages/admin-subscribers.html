<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscribers - Incozi Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
        background-color: #f3f4f6;
        display: flex;
        min-height: 100vh;
    }
    
    .dash-sidebar {
        width: 260px;
        background: #fff;
        border-right: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
        z-index: 100;
    }
    
    .dash-logo {
        padding: 1.5rem;
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--accent-200);
        text-decoration: none;
        border-bottom: 1px solid #e5e7eb;
    }
    
    .dash-nav {
        flex: 1;
        padding: 1.5rem 1rem;
    }
    
    .dash-nav-item {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        color: var(--text-200);
        text-decoration: none;
        border-radius: 6px;
        margin-bottom: 0.5rem;
        transition: all 0.2s;
        cursor: pointer;
    }
    
    .dash-nav-item:hover, .dash-nav-item.active {
        background-color: #f0f9ff;
        color: var(--accent-200);
    }
    
    .dash-nav-item i {
        width: 24px;
        margin-right: 10px;
    }
    
    .dash-user {
        padding: 1.5rem;
        border-top: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    
    .user-avatar {
        width: 40px;
        height: 40px;
        background: var(--accent-100);
        color: var(--accent-200);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.2rem;
    }
    
    .dash-main {
        flex: 1;
        margin-left: 260px;
        padding: 2rem;
        overflow-y: auto;
    }
    
    .dash-header {
        margin-bottom: 2rem;
    }
    
    .dash-header h1 {
        font-size: 2rem;
        color: var(--text-100);
        margin: 0;
    }
    
    .dash-content {
        background: white;
        border-radius: 12px;
        padding: 2rem;
        min-height: 400px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    
    .empty-state {
        color: #999;
    }
    
    .empty-state i {
        font-size: 3rem;
        margin-bottom: 1rem;
        color: #ddd;
    }
    
    .empty-state p {
        font-size: 1.1rem;
        color: #666;
    }

    .user-name {
        font-weight: 600;
        color: var(--text-100);
    }

    .sign-out-btn {
        background: none;
        border: none;
        color: #ef4444;
        cursor: pointer;
        font-weight: 500;
        text-align: left;
        padding: 0;
        transition: color 0.2s;
    }
    
    .sign-out-btn:hover {
        color: #dc2626;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="dash-sidebar">
    <a href="../index.html" class="dash-logo">incozi.</a>
    
    <nav class="dash-nav">
        <a href="admin.html" class="dash-nav-item">
            <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>
        <a href="admin-clients.html" class="dash-nav-item">
            <i class="fa-solid fa-users"></i> Clients
        </a>
        <a href="admin-documents.html" class="dash-nav-item">
            <i class="fa-solid fa-folder"></i> Documents
        </a>
        <a href="admin-bookings.html" class="dash-nav-item">
            <i class="fa-solid fa-calendar-check"></i> Bookings
        </a>
        <a href="admin-subscribers.html" class="dash-nav-item active">
            <i class="fa-solid fa-envelope"></i> Newsletter
        </a>
    </nav>
    
    <div class="dash-user">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <div class="user-name" id="adminName">System Admin</div>
      </div>
      <button class="sign-out-btn" id="signOutBtn">
        <i class="fa-solid fa-sign-out-alt" style="margin-right: 0.5rem;"></i> Sign Out
      </button>
    </div>
  </aside>
  
  <!-- Main Content -->
  <main class="dash-main">
    <div class="dash-header">
      <h1>Subscribers</h1>
    </div>
    
    <div class="dash-content">
      <div class="empty-state">
        <i class="fa-solid fa-users"></i>
        <p>Subscriber management coming soon.<br>More features to be added.</p>
      </div>
    </div>
  </main>
  
  <script src="../script.js"></script>
  <script>
    // Check if admin is logged in
    const token = localStorage.getItem('incozi_token');
    const userStr = localStorage.getItem('incozi_user');
    
    if (!token || !userStr) {
      window.location.href = 'account.html';
    } else {
      const user = JSON.parse(userStr);
      const firstLetter = user.full_name ? user.full_name.charAt(0).toUpperCase() : 'A';
      document.querySelector('.user-avatar').textContent = firstLetter;
      document.getElementById('adminName').textContent = user.full_name || 'Admin';
    }
    
    // Handle sign out
    document.getElementById('signOutBtn').addEventListener('click', () => {
      localStorage.removeItem('incozi_token');
      localStorage.removeItem('incozi_user');
      window.location.href = 'account.html';
    });
  </script>
</body>
</html>
